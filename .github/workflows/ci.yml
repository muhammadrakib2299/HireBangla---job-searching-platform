name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type check shared packages
        run: |
          pnpm --filter @job-platform/shared-types exec tsc --noEmit
          pnpm --filter @job-platform/shared-validators exec tsc --noEmit
          pnpm --filter @job-platform/shared-constants exec tsc --noEmit

      - name: Type check API
        run: pnpm --filter @job-platform/api exec tsc --noEmit

      - name: Type check Web
        run: pnpm --filter web exec tsc --noEmit

      - name: Lint API
        run: pnpm --filter @job-platform/api lint

      - name: Lint Web
        run: pnpm --filter web lint

      - name: Build API
        run: pnpm --filter @job-platform/api build

      - name: Build Web
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_API_URL: https://api.hirebangla.com/api/v1
          NEXT_PUBLIC_SITE_URL: https://hirebangla.com
